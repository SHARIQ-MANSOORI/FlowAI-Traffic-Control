openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FlowAI Lite Traffic Control API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: traffic
    description: Traffic signal operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /traffic/state:
    get:
      operationId: getTrafficState
      tags: [traffic]
      summary: Get current traffic state
      responses:
        "200":
          description: Current traffic state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficState"

  /traffic/emergency:
    post:
      operationId: triggerEmergency
      tags: [traffic]
      summary: Trigger per-road emergency corridor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmergencyRequest"
      responses:
        "200":
          description: Emergency triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyResponse"

  /traffic/reset:
    post:
      operationId: resetTraffic
      tags: [traffic]
      summary: Reset to normal AI operation
      responses:
        "200":
          description: Traffic reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResponse"

  /traffic/ambulance/start:
    post:
      operationId: startAmbulanceCorridor
      tags: [traffic]
      summary: Start ambulance green corridor (West → Center → East)
      responses:
        "200":
          description: Ambulance corridor started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmbulanceStartResponse"

  /traffic/ambulance/stop:
    post:
      operationId: stopAmbulanceCorridor
      tags: [traffic]
      summary: Cancel active ambulance corridor
      responses:
        "200":
          description: Corridor cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SignalColor:
      type: string
      enum: [red, yellow, green]

    RoadSignal:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        direction:
          type: string
          enum: [north, south, east, west]
        signal:
          $ref: "#/components/schemas/SignalColor"
        vehicleCount:
          type: integer
        isEmergency:
          type: boolean
        densityPercent:
          type: number
      required: [id, name, direction, signal, vehicleCount, isEmergency, densityPercent]

    AmbulancePhase:
      type: string
      enum: [idle, approach, crossing, exit, complete]

    AmbulanceState:
      type: object
      properties:
        active:
          type: boolean
        phase:
          $ref: "#/components/schemas/AmbulancePhase"
        progress:
          type: number
          description: 0–100, position along West→Center→East route
        elapsedSeconds:
          type: number
        normalTimeMin:
          type: number
          description: Estimated normal travel time without AI corridor (minutes)
        aiTimeMin:
          type: number
          description: AI-assisted travel time with green corridor (minutes)
        timeSavedMin:
          type: number
        routeLabel:
          type: string
          description: "e.g. West → Center → East"
      required: [active, phase, progress, elapsedSeconds, normalTimeMin, aiTimeMin, timeSavedMin, routeLabel]

    TrafficState:
      type: object
      properties:
        roads:
          type: array
          items:
            $ref: "#/components/schemas/RoadSignal"
        emergencyMode:
          type: boolean
        emergencyRoad:
          type: string
          nullable: true
        cycleTime:
          type: integer
        greenDuration:
          type: integer
        countdown:
          type: integer
        activeLane:
          type: string
          nullable: true
        ambulance:
          $ref: "#/components/schemas/AmbulanceState"
        timestamp:
          type: string
      required: [roads, emergencyMode, emergencyRoad, cycleTime, greenDuration, countdown, activeLane, ambulance, timestamp]

    EmergencyRequest:
      type: object
      properties:
        roadId:
          type: string
      required: [roadId]

    EmergencyResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        roadId:
          type: string
      required: [success, message, roadId]

    AmbulanceStartResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    ResetResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]
